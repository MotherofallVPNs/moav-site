site_name: MoaV Docs
site_url: https://moav.sh/docs/
# Header repo link + star/fork counts point at the main MoaV project.
repo_url: https://github.com/MotherofallVPNs/MoaV
repo_name: MotherofallVPNs/MoaV
# "Edit this page" still targets this repo, where the docs source lives.
edit_uri_template: https://github.com/MotherofallVPNs/moav-site/edit/main/docs/{path}

theme:
  name: material
  palette:
    - scheme: slate
      primary: cyan
      accent: cyan
      toggle:
        icon: material/brightness-7
        name: Switch to light mode
    - scheme: default
      primary: cyan
      accent: cyan
      toggle:
        icon: material/brightness-4
        name: Switch to dark mode
  features:
    - navigation.instant
    - navigation.sections
    - navigation.top
    - navigation.expand
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.action.edit

nav:
  - Home: index.md
  - Quick Start: quick-start.md
  - About:
    - Mission: mission.md
    - Impact: impact.md
    - Threat Model: threat-model.md
    - Architecture: architecture.md
    - Supported Protocols: protocols.md
    - Philosophy: philosophy.md
  - Getting Started:
    - Setup Guide: SETUP.md
    - DNS Configuration: DNS.md
    - VPS Deployment: DEPLOY.md
  - User Guides:
    - Client Apps: CLIENTS.md
    - MoaV Client: client.md
    - MahsaNG Import: mahsanet.md
    - CLI Reference: CLI.md
    - Monitoring: MONITORING.md
    - Troubleshooting: TROUBLESHOOTING.md
  - Security:
    - OPSEC Guide: OPSEC.md
  - Developer:
    - Development & Testing: development.md

markdown_extensions:
  - tables
  - toc:
      permalink: true
  - admonition
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
