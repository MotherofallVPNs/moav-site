name: Deploy Site & Docs

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Build docs
        run: |
          pip install mkdocs-material
          mkdocs build -d site/docs

      - name: Publish latest install.sh
        # install.sh is server code — its source of truth lives in
        # MotherofallVPNs/moav. We serve it from moav.sh (reachable in censored
        # networks) instead of redirecting users to a GitHub host. Best-effort:
        # pull the latest release asset; if none exists yet, keep the copy
        # committed here so the site never serves a 404.
        run: |
          URL="https://github.com/MotherofallVPNs/moav/releases/latest/download/install.sh"
          if curl -fsSL "$URL" -o site/install.sh.new && [ -s site/install.sh.new ]; then
            mv site/install.sh.new site/install.sh
            echo "Published install.sh from the latest release asset."
          else
            rm -f site/install.sh.new
            echo "No release asset yet — keeping the committed fallback site/install.sh."
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'site'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
